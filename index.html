<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>佩里科岛背包分配器 Minimal v7</title>
<style>
:root{
  --bg:#f6f7f9;--card:#fff;--text:#111827;--muted:#6b7280;
  --line:#dbe1ea;--accent:#6366f1;--soft:#eef0ff;
  --ok:#168557;--warn:#b36b00
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0f1117;--card:#181c25;--text:#f5f7fb;--muted:#a6adba;--line:#303746;--accent:#8b8dff;--soft:#242947;--ok:#5bd39b;--warn:#f0b455}
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}
.page{width:min(1080px,calc(100% - 24px));margin:auto;padding:24px 0 40px}
h1{margin:0 0 16px;font-size:28px;letter-spacing:-.03em}
.layout{display:grid;grid-template-columns:390px 1fr;gap:16px;align-items:start}
.panel{border:1px solid var(--line);border-radius:18px;background:var(--card);overflow:hidden}
.head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.head h2{margin:0;font-size:18px}
.desc{margin:4px 0 0;color:var(--muted);font-size:12px}
.section{padding:14px 16px 0}
.box{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;border:1px solid var(--line);border-radius:14px}
.label{font-weight:800}.hint{display:none}
.picker,.mode{display:grid;gap:4px;padding:4px;border:1px solid var(--line);border-radius:12px}
.picker{grid-template-columns:repeat(3,40px)}.mode{grid-template-columns:72px 72px}
.picker button,.mode button{height:30px;border:0;border-radius:8px;background:transparent;color:var(--text);cursor:pointer;font-weight:800}
.picker button.active,.mode button.active{background:var(--accent);color:#fff}
.inputs{display:grid;gap:10px;padding:14px 16px}
.row{display:grid;grid-template-columns:1fr 112px;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:14px}
.name{display:flex;align-items:center;gap:8px;font-weight:800}
.ico{display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:var(--soft)}
.meta{margin:4px 0 0 38px;color:var(--muted);font-size:12px}
.numBox{display:flex;align-items:center;gap:4px;padding:4px;border:1px solid var(--line);border-radius:12px}
.numBox button{width:28px;height:28px;border:0;border-radius:8px;background:transparent;color:var(--text);cursor:pointer;font-size:18px}
.numBox button:hover{background:var(--soft)}
.numBox input{width:36px;border:0;outline:0;background:transparent;color:var(--text);text-align:center;font-weight:800}
.chips{display:none}
.actions{display:grid;grid-template-columns:1fr 86px;gap:10px;padding:0 16px 16px}
.primary,.secondary,.chip{height:42px;border-radius:12px;cursor:pointer;font-weight:800}
.primary{border:0;background:var(--accent);color:#fff}
.secondary,.chip{border:1px solid var(--line);background:var(--card);color:var(--text)}
.results{padding:16px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.metric{padding:10px;border:1px solid var(--line);border-radius:12px}
.metric span{display:block;color:var(--muted);font-size:11px}
.metric strong{display:block;margin-top:4px;font-size:16px}
.status{display:flex;gap:10px;margin-bottom:12px;padding:12px;border-radius:14px;background:rgba(22,133,87,.12);color:var(--ok)}
.status.warn{background:rgba(179,107,0,.13);color:var(--warn)}
.mark{display:grid;place-items:center;flex:0 0 24px;width:24px;height:24px;border-radius:50%;background:color-mix(in srgb,currentColor 15%,transparent);font-weight:900}
.status b{display:block}.status span{display:block;margin-top:3px;font-size:12px;line-height:1.45}
.players{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.player{padding:14px;border:1px solid var(--line);border-radius:14px}
.ptop{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.ptitle{display:flex;align-items:center;gap:8px;font-weight:900}
.num{display:grid;place-items:center;width:26px;height:26px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px}
.bar{height:6px;border-radius:999px;background:var(--line);overflow:hidden;margin-bottom:10px}.bar div{height:100%;background:var(--accent)}
.loot{display:grid;gap:8px}
.line{padding:9px;border-radius:10px;background:var(--soft)}
.lineMain{display:flex;justify-content:space-between;gap:10px;font-size:13px;font-weight:800}
.detail{margin-top:3px;color:var(--muted);font-size:11px;line-height:1.4}
.empty{color:var(--muted);font-size:13px}
.unused{margin-top:12px;padding:12px;border:1px dashed var(--line);border-radius:14px}
.unusedTitle{margin-bottom:8px;font-size:12px;font-weight:900}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:5px 8px;border-radius:999px;background:var(--soft);color:var(--muted);font-size:11px;font-weight:700}
.logic{display:none}
.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,16px);opacity:0;transition:.18s;padding:9px 12px;border:1px solid var(--line);border-radius:999px;background:var(--card);font-size:13px;font-weight:800}
.toast.show{transform:translate(-50%,0);opacity:1}
@media(max-width:900px){.layout{grid-template-columns:1fr}.metrics,.players{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.page{width:calc(100% - 16px);padding-top:14px}.metrics,.players{grid-template-columns:1fr}.box{align-items:flex-start;flex-direction:column}.picker,.mode{width:100%}.picker{grid-template-columns:repeat(3,1fr)}.mode{grid-template-columns:1fr 1fr}.row{grid-template-columns:1fr 106px}.meta{margin-left:0}.actions{grid-template-columns:1fr}}
</style>
</head>
<body>

<main class="page">
  <h1>佩里科岛背包分配器</h1>

  <section class="layout">
    <section class="panel">
      <div class="head">
        <div>
          <h2>参数</h2>
          <p class="desc">修改后需点击“生成方案”。</p>
        </div>
      </div>

      <div class="section">
        <div class="box">
          <div><div class="label">人数</div><div class="hint">2—4人</div></div>
          <div class="picker" role="group" aria-label="参与人数">
            <button type="button" data-player-count="2">2人</button>
            <button type="button" data-player-count="3">3人</button>
            <button class="active" type="button" data-player-count="4">4人</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="box">
          <div><div class="label">模式</div><div class="hint">严格满包 / 收益容差</div></div>
          <div class="mode" role="group" aria-label="优化模式">
            <button class="active" type="button" data-mode="strict">满包</button>
            <button type="button" data-mode="profit">收益</button>
          </div>
        </div>
      </div>

      <div class="inputs" id="inputs"></div>

      <div class="actions">
        <button class="primary" id="calculateBtn">生成方案</button>
        <button class="secondary" id="clearBtn">清空</button>
      </div>
    </section>

    <section class="panel">
      <div class="head">
        <div>
          <h2>方案</h2>
          <p class="desc">输出每人拿哪一堆、第几下。</p>
        </div>
        <button class="chip" id="copyBtn">复制</button>
      </div>

      <div class="results">
        <div class="metrics">
          <div class="metric"><span>可用</span><strong id="availableMetric">—</strong></div>
          <div class="metric"><span>装载</span><strong id="usedMetric">—</strong></div>
          <div class="metric"><span>满包</span><strong id="fullMetric">0 / 4</strong></div>
          <div class="metric"><span>收益</span><strong id="valueMetric">—</strong></div>
        </div>

        <div class="status warn" id="statusBanner">
          <div class="mark">!</div>
          <div>
            <b id="statusTitle">等待生成方案</b>
            <span id="statusText">满包模式会优先精确满包；收益模式允许少量空包换收益。</span>
          </div>
        </div>

        <div class="players" id="players"></div>

        <div class="unused">
          <div class="unusedTitle">未使用 / 未拿完</div>
          <div class="tags" id="unusedList"><span class="tag">点击“生成方案”后显示</span></div>
        </div>
      </div>
    </section>
  </section>
</main>

<div class="toast" id="toast">已复制</div>

<script>
"use strict";

const PLAYER_CAPACITY = 1800;
const SCALE = 5;
const CAP = PLAYER_CAPACITY / SCALE;
const TOP = 2;
const MAX_COUNT = 24;
const PROFIT_TOLERANCE_UNITS = 45; // 2.5% of one bag in 1800-unit model.

let playerCount = 4;
let mode = "strict";
let latestResult = null;

const TYPES = [
  {key:"gold", name:"黄金", icon:"🪙", noun:"堆", sequence:[100,200,100,200,200,200,200], averageValue:331000},
  {key:"cocaine", name:"可卡因", icon:"📦", noun:"堆", sequence:[100,100,80,60,40,80,120,120,160,40], averageValue:200000},
  {key:"weed", name:"大麻", icon:"🌿", noun:"堆", sequence:[75,75,60,45,30,60,90,90,120,30], averageValue:132750},
  {key:"artwork", name:"画作", icon:"🖼️", noun:"幅", sequence:[900], averageValue:168750},
  {key:"cash", name:"现金", icon:"💵", noun:"堆", sequence:[50,50,40,30,20,40,60,60,80,20], averageValue:81000}
].map((t, priority) => {
  const total = t.sequence.reduce((a,b)=>a+b,0);
  return {
    ...t,
    priority,
    totalUnits: total,
    scaledSequence: t.sequence.map(x=>x/SCALE),
    scaledTotal: total/SCALE,
    valuePerUnit: t.averageValue/total
  };
});

const typeMap = Object.fromEntries(TYPES.map(t=>[t.key,t]));
const inputContainer = document.getElementById("inputs");
const playersContainer = document.getElementById("players");

function totalCap(){ return playerCount * PLAYER_CAPACITY; }
function scaledTotalCap(){ return playerCount * CAP; }
function fmtNum(v){ return v.toFixed(1).replace(/\.0$/,""); }
function pct(units){ return fmtNum(units*100/PLAYER_CAPACITY)+"%"; }
function money(v){ return "$"+Math.round(v).toLocaleString("en-US"); }

function createInputs(){
  inputContainer.innerHTML = TYPES.map(t => {
    const countText = t.sequence.length === 1 ? "每幅1次" : `每堆${t.sequence.length}下`;
    return `<div class="row">
      <div>
        <div class="name"><span class="ico">${t.icon}</span><span>${t.name}</span></div>
        <div class="meta">每${t.noun}占${pct(t.totalUnits)} · ${countText} · 约${money(t.averageValue)}/${t.noun}</div>
      </div>
      <div class="numBox">
        <button type="button" data-step="-1" data-key="${t.key}">−</button>
        <input id="${t.key}" type="number" min="0" max="${MAX_COUNT}" step="1" value="0" inputmode="numeric" />
        <button type="button" data-step="1" data-key="${t.key}">+</button>
      </div>
    </div>`;
  }).join("");
}

function getCounts(){
  const c = {};
  for(const t of TYPES){
    const v = Number(document.getElementById(t.key).value);
    c[t.key] = Number.isFinite(v) ? Math.max(0, Math.min(MAX_COUNT, Math.floor(v))) : 0;
  }
  return c;
}

function setCounts(values){
  for(const t of TYPES) document.getElementById(t.key).value = values[t.key] ?? 0;
  markDirty("参数已载入，点击“生成方案”开始计算。");
}

function betterOption(a,b){
  if(!b) return true;
  if(a.touches !== b.touches) return a.touches < b.touches;
  if(a.partials !== b.partials) return a.partials < b.partials;
  if(a.fulls !== b.fulls) return a.fulls > b.fulls;
  return false;
}

function buildTypeOptions(type, count, maxScaled){
  let dp = new Map([[0,{units:0, scaledUnits:0, prefixCounts:[], touches:0, partials:0, fulls:0}]]);
  const prefix = [{count:0, units:0, scaledUnits:0}];
  let u=0, su=0;
  for(let i=0;i<type.sequence.length;i++){
    u += type.sequence[i];
    su += type.scaledSequence[i];
    prefix.push({count:i+1, units:u, scaledUnits:su});
  }

  for(let pile=0; pile<count; pile++){
    const next = new Map();
    for(const [used,opt] of dp.entries()){
      for(const p of prefix){
        const w = used + p.scaledUnits;
        if(w > maxScaled) continue;
        const cand = {
          units: opt.units + p.units,
          scaledUnits: w,
          prefixCounts: opt.prefixCounts.concat(p.count),
          touches: opt.touches + (p.count>0 ? 1 : 0),
          partials: opt.partials + (p.count>0 && p.count<type.sequence.length ? 1 : 0),
          fulls: opt.fulls + (p.count===type.sequence.length ? 1 : 0)
        };
        if(betterOption(cand, next.get(w))) next.set(w,cand);
      }
    }
    dp = next;
  }

  const result = [];
  for(const opt of dp.values()){
    result.push({
      ...opt,
      typeKey: type.key,
      value: opt.units * type.valuePerUnit
    });
  }
  result.sort((a,b)=>a.scaledUnits-b.scaledUnits);
  return result;
}

function addCandidate(list, cand){
  const sig = TYPES.map(t => (cand.byType[t.key]?.scaledUnits ?? 0)).join(",");
  const old = list.findIndex(x=>x.sig===sig);
  if(old >= 0){
    if(cand.value <= list[old].value + 0.001) return;
    list.splice(old,1);
  }
  cand.sig = sig;
  list.push(cand);
  list.sort((a,b)=> b.value-a.value || a.touches-b.touches || a.partials-b.partials);
  if(list.length > TOP) list.length = TOP;
}

function combineTypeOptions(typeOptions){
  let states = new Map([[0,[{value:0, touches:0, partials:0, byType:{}, sig:""}]]]);

  for(const type of TYPES){
    const opts = typeOptions[type.key] || [];
    const next = new Map();

    for(const [used, candidates] of states.entries()){
      for(const cand of candidates){
        for(const opt of opts){
          const w = used + opt.scaledUnits;
          if(w > scaledTotalCap()) continue;
          if(!next.has(w)) next.set(w, []);
          addCandidate(next.get(w), {
            value: cand.value + opt.value,
            touches: cand.touches + opt.touches,
            partials: cand.partials + opt.partials,
            byType: {...cand.byType, [type.key]: opt}
          });
        }
      }
    }
    states = next;
  }

  return states;
}

function chooseSelection(states, piles){
  const weights = [...states.keys()].sort((a,b)=>b-a);
  const toleranceScaled = Math.floor(PROFIT_TOLERANCE_UNITS / SCALE) * playerCount;
  const maxWeight = weights[0] ?? 0;
  const minAllowed = mode === "profit" ? Math.max(0, maxWeight - toleranceScaled) : 0;
  let best = null;

  for(const w of weights){
    if(w < minAllowed) break;
    const cands = (states.get(w) || []).slice().sort((a,b)=>b.value-a.value);

    for(const cand of cands){
      const tasks = buildTasksFromSelection(cand.byType, piles);
      const packing = packTasks(tasks);
      if(!packing.success) continue;

      const candidate = {
        scaledUnits: w,
        units: w*SCALE,
        value: cand.value,
        byType: cand.byType,
        tasks,
        packing,
        splitCount: packing.splitCount,
        maxPileCount: packing.maxPileCount,
        totalPileTouches: packing.totalPileTouches
      };

      if(isBetterSelection(candidate,best)) best = candidate;
    }
  }

  if(best) return best;

  return {scaledUnits:0, units:0, value:0, byType:{}, tasks:[], packing:{success:true, segments:[], splitCount:0, maxPileCount:0, totalPileTouches:0}};
}

function isBetterSelection(a,b){
  if(!b) return true;
  if(mode === "strict"){
    if(a.scaledUnits !== b.scaledUnits) return a.scaledUnits > b.scaledUnits;
    if(Math.abs(a.value-b.value) > 0.001) return a.value > b.value;
  } else {
    if(Math.abs(a.value-b.value) > 0.001) return a.value > b.value;
    if(a.scaledUnits !== b.scaledUnits) return a.scaledUnits > b.scaledUnits;
  }
  if(a.splitCount !== b.splitCount) return a.splitCount < b.splitCount;
  if(a.maxPileCount !== b.maxPileCount) return a.maxPileCount < b.maxPileCount;
  return a.totalPileTouches < b.totalPileTouches;
}

function buildPiles(counts){
  const piles = [];
  for(const type of TYPES){
    for(let i=0;i<counts[type.key];i++){
      piles.push({typeKey:type.key, typeName:type.name, pileNumber:i+1, sequence:type.sequence, scaledSequence:type.scaledSequence, valuePerUnit:type.valuePerUnit});
    }
  }
  return piles;
}

function buildTasksFromSelection(byType, piles){
  const indexByType = Object.fromEntries(TYPES.map(t=>[t.key,0]));
  const tasks = [];

  for(const pile of piles){
    const opt = byType[pile.typeKey];
    if(!opt) continue;
    const localIndex = indexByType[pile.typeKey]++;
    const take = opt.prefixCounts[localIndex] || 0;
    if(take <= 0) continue;

    let units=0, scaled=0;
    for(let i=0;i<take;i++){
      units += pile.sequence[i];
      scaled += pile.scaledSequence[i];
    }
    tasks.push({
      pileIndex: tasks.length,
      typeKey: pile.typeKey,
      typeName: pile.typeName,
      pileNumber: pile.pileNumber,
      takeCount: take,
      units,
      scaledUnits: scaled,
      value: units * pile.valuePerUnit,
      sequence: pile.sequence,
      scaledSequence: pile.scaledSequence,
      valuePerUnit: pile.valuePerUnit
    });
  }

  tasks.sort((a,b)=> typeMap[a.typeKey].priority-typeMap[b.typeKey].priority || b.scaledUnits-a.scaledUnits);
  return tasks;
}

function segment(task,start,end,playerIndex=-1){
  let units=0, scaled=0;
  for(let i=start-1;i<end;i++){
    units += task.sequence[i];
    scaled += task.scaledSequence[i];
  }
  return {pileIndex:task.pileIndex,typeKey:task.typeKey,typeName:task.typeName,pileNumber:task.pileNumber,start,end,count:end-start+1,units,scaledUnits:scaled,value:units*task.valuePerUnit,playerIndex};
}

function metrics(segments, remaining, splitCount){
  const sets = Array.from({length:playerCount},()=>new Set());
  for(const s of segments) if(s.playerIndex>=0) sets[s.playerIndex].add(s.pileIndex);
  const counts = sets.map(s=>s.size);
  return {success:true, segments, remaining, splitCount, pileCounts:counts, maxPileCount:counts.length?Math.max(...counts):0, totalPileTouches:counts.reduce((a,b)=>a+b,0)};
}

function betterPack(a,b){
  if(!b) return true;
  if(a.splitCount!==b.splitCount) return a.splitCount<b.splitCount;
  if(a.maxPileCount!==b.maxPileCount) return a.maxPileCount<b.maxPileCount;
  if(a.totalPileTouches!==b.totalPileTouches) return a.totalPileTouches<b.totalPileTouches;
  return Math.min(...a.remaining) > Math.min(...b.remaining);
}

function packTasks(tasks){
  // Greedy Segment Packing（贪心分段装箱）：O(堆数 × 玩家数 × 抓取次数)，用于替代旧版深度搜索。
  // 规则仍然保持：一堆最多拆给2个人；优先整堆给一个人；再按一个切点拆成连续两段。
  const remaining = Array(playerCount).fill(CAP);
  const segs = [];
  const pileSets = Array.from({length:playerCount},()=>new Set());

  const ordered = [...tasks].sort((a,b)=>
    b.scaledUnits-a.scaledUnits ||
    typeMap[a.typeKey].priority-typeMap[b.typeKey].priority ||
    a.pileNumber-b.pileNumber
  );

  function place(part, player){
    remaining[player] -= part.scaledUnits;
    pileSets[player].add(part.pileIndex);
    segs.push({...part, playerIndex:player});
  }

  function scoreSingle(part, p){
    if(remaining[p] < part.scaledUnits) return Infinity;
    const newPile = pileSets[p].has(part.pileIndex) ? 0 : 1;
    const after = remaining[p] - part.scaledUnits;
    // 少接触堆数优先，其次让背包更接近满包。
    return (pileSets[p].size + newPile) * 100000 + after;
  }

  function scorePair(a,b,p1,p2){
    if(p1===p2) return Infinity;
    if(remaining[p1] < a.scaledUnits || remaining[p2] < b.scaledUnits) return Infinity;
    const s1 = pileSets[p1].size + (pileSets[p1].has(a.pileIndex) ? 0 : 1);
    const s2 = pileSets[p2].size + (pileSets[p2].has(b.pileIndex) ? 0 : 1);
    const after1 = remaining[p1] - a.scaledUnits;
    const after2 = remaining[p2] - b.scaledUnits;
    return Math.max(s1,s2)*1000000 + (s1+s2)*10000 + Math.max(after1,after2)*100 + Math.min(after1,after2);
  }

  for(const task of ordered){
    const whole = segment(task,1,task.takeCount);
    let bestPlayer = -1;
    let bestScore = Infinity;

    for(let p=0;p<playerCount;p++){
      const sc = scoreSingle(whole,p);
      if(sc < bestScore){
        bestScore = sc;
        bestPlayer = p;
      }
    }

    if(bestPlayer >= 0){
      place(whole,bestPlayer);
      continue;
    }

    let best = null;

    for(let cut=1; cut<task.takeCount; cut++){
      const a = segment(task,1,cut);
      const b = segment(task,cut+1,task.takeCount);

      for(let p1=0;p1<playerCount;p1++){
        for(let p2=0;p2<playerCount;p2++){
          const sc = scorePair(a,b,p1,p2);
          if(!best || sc < best.score){
            best = {a,b,p1,p2,score:sc};
          }
        }
      }
    }

    if(!best || !Number.isFinite(best.score)){
      return {success:false, segments:[], remaining, splitCount:999, maxPileCount:999, totalPileTouches:999};
    }

    place(best.a,best.p1);
    place(best.b,best.p2);
  }

  let splitCount = 0;
  const byPile = new Map();
  for(const s of segs){
    if(!byPile.has(s.pileIndex)) byPile.set(s.pileIndex, new Set());
    byPile.get(s.pileIndex).add(s.playerIndex);
  }
  for(const set of byPile.values()) if(set.size > 1) splitCount++;

  return metrics(segs, remaining, splitCount);
}


function buildPileOptions(pile){
  const options = [{count:0, units:0, scaledUnits:0, value:0}];
  let units = 0;
  let scaled = 0;

  for(let i=0;i<pile.sequence.length;i++){
    units += pile.sequence[i];
    scaled += pile.scaledSequence[i];
    options.push({
      count:i+1,
      units,
      scaledUnits:scaled,
      value:units * pile.valuePerUnit
    });
  }

  return options;
}

function buildTasksFromExactPicks(piles, picks){
  const tasks = [];

  for(let i=0;i<piles.length;i++){
    const pile = piles[i];
    const take = picks[i] || 0;
    if(take <= 0) continue;

    let units = 0;
    let scaled = 0;

    for(let g=0; g<take; g++){
      units += pile.sequence[g];
      scaled += pile.scaledSequence[g];
    }

    tasks.push({
      pileIndex: tasks.length,
      typeKey: pile.typeKey,
      typeName: pile.typeName,
      pileNumber: pile.pileNumber,
      takeCount: take,
      units,
      scaledUnits: scaled,
      value: units * pile.valuePerUnit,
      sequence: pile.sequence,
      scaledSequence: pile.scaledSequence,
      valuePerUnit: pile.valuePerUnit
    });
  }

  tasks.sort((a,b)=>
    typeMap[a.typeKey].priority-typeMap[b.typeKey].priority ||
    b.scaledUnits-a.scaledUnits ||
    a.pileNumber-b.pileNumber
  );

  return tasks;
}

function byTypeFromExactPicks(piles, picks){
  const byType = {};

  for(let i=0;i<piles.length;i++){
    const pile = piles[i];
    const type = typeMap[pile.typeKey];

    if(!byType[pile.typeKey]){
      byType[pile.typeKey] = {
        units:0,
        scaledUnits:0,
        prefixCounts:[],
        touches:0,
        partials:0,
        fulls:0,
        typeKey:pile.typeKey,
        value:0
      };
    }

    const take = picks[i] || 0;
    let units = 0;
    let scaled = 0;

    for(let g=0; g<take; g++){
      units += pile.sequence[g];
      scaled += pile.scaledSequence[g];
    }

    const bucket = byType[pile.typeKey];
    bucket.prefixCounts.push(take);
    bucket.units += units;
    bucket.scaledUnits += scaled;
    bucket.value += units * pile.valuePerUnit;
    if(take > 0) bucket.touches++;
    if(take > 0 && take < type.sequence.length) bucket.partials++;
    if(take === type.sequence.length) bucket.fulls++;
  }

  return byType;
}

function packTasksWithSearch(tasks, maxCalls=80000){
  const ordered = [...tasks].sort((a,b)=>
    b.scaledUnits-a.scaledUnits ||
    typeMap[a.typeKey].priority-typeMap[b.typeKey].priority ||
    a.pileNumber-b.pileNumber
  );

  const remaining = Array(playerCount).fill(CAP);
  const segments = [];
  const pileSets = Array.from({length:playerCount},()=>new Set());
  const memo = new Set();
  let calls = 0;
  let best = null;

  function commit(seg, player){
    remaining[player] -= seg.scaledUnits;
    const existed = pileSets[player].has(seg.pileIndex);
    pileSets[player].add(seg.pileIndex);
    segments.push({...seg, playerIndex:player, _newPile:!existed});
  }

  function rollback(){
    const seg = segments.pop();
    remaining[seg.playerIndex] += seg.scaledUnits;
    if(seg._newPile) pileSets[seg.playerIndex].delete(seg.pileIndex);
  }

  function partitionOptions(task){
    const options = [[segment(task,1,task.takeCount)]];

    for(let cut=1; cut<task.takeCount; cut++){
      options.push([
        segment(task,1,cut),
        segment(task,cut+1,task.takeCount)
      ]);
    }

    return options;
  }

  function packKey(index, splitCount){
    return index + "|" + splitCount + "|" + remaining.slice().sort((a,b)=>a-b).join(",");
  }

  function dfs(index, splitCount){
    calls++;
    if(calls > maxCalls) return;

    if(best && splitCount > best.splitCount) return;

    if(index >= ordered.length){
      const candidate = metrics(
        segments.map(seg=>({...seg})),
        [...remaining],
        splitCount
      );

      if(betterPack(candidate, best)) best = candidate;
      return;
    }

    const key = packKey(index, splitCount);
    if(memo.has(key)) return;

    const task = ordered[index];

    const options = partitionOptions(task).sort((a,b)=>a.length-b.length);

    for(const parts of options){
      if(best && splitCount + parts.length - 1 > best.splitCount) continue;

      if(parts.length === 1){
        const part = parts[0];
        const order = Array.from({length:playerCount},(_,i)=>i)
          .sort((a,b)=>
            pileSets[a].size-pileSets[b].size ||
            remaining[b]-remaining[a]
          );

        const seen = new Set();

        for(const player of order){
          if(remaining[player] < part.scaledUnits) continue;

          const sig = remaining[player] + "|" + pileSets[player].size + "|" + pileSets[player].has(part.pileIndex);
          if(seen.has(sig)) continue;
          seen.add(sig);

          commit(part, player);
          dfs(index+1, splitCount);
          rollback();

          if(calls > maxCalls) break;
        }
      }else{
        const [first, second] = parts;
        const orderA = Array.from({length:playerCount},(_,i)=>i)
          .sort((a,b)=>
            pileSets[a].size-pileSets[b].size ||
            remaining[b]-remaining[a]
          );

        for(const p1 of orderA){
          if(remaining[p1] < first.scaledUnits) continue;

          commit(first, p1);

          const orderB = Array.from({length:playerCount},(_,i)=>i)
            .sort((a,b)=>
              pileSets[a].size-pileSets[b].size ||
              remaining[b]-remaining[a]
            );

          for(const p2 of orderB){
            if(p2 === p1) continue;
            if(remaining[p2] < second.scaledUnits) continue;

            commit(second, p2);
            dfs(index+1, splitCount+1);
            rollback();

            if(calls > maxCalls) break;
          }

          rollback();

          if(calls > maxCalls) break;
        }
      }

      if(calls > maxCalls) break;
    }

    memo.add(key);
  }

  dfs(0,0);

  return best || {
    success:false,
    segments:[],
    remaining,
    splitCount:999,
    maxPileCount:999,
    totalPileTouches:999
  };
}

function exactStrictSelection(piles){
  const capacity = scaledTotalCap();
  const optionsByPile = piles.map(buildPileOptions);

  let dp = new Array(capacity+1).fill(-Infinity);
  dp[0] = 0;

  const parents = [];

  for(let i=0;i<piles.length;i++){
    const next = new Array(capacity+1).fill(-Infinity);
    const parent = new Array(capacity+1).fill(null);
    const options = optionsByPile[i];

    for(let used=0; used<=capacity; used++){
      if(dp[used] === -Infinity) continue;

      for(const option of options){
        const nextUsed = used + option.scaledUnits;
        if(nextUsed > capacity) continue;

        const value = dp[used] + option.value;

        if(value > next[nextUsed] + 0.001){
          next[nextUsed] = value;
          parent[nextUsed] = {
            previous: used,
            count: option.count
          };
        }
      }
    }

    dp = next;
    parents.push(parent);
  }

  for(let target=capacity; target>=0; target--){
    if(dp[target] === -Infinity) continue;

    const picks = new Array(piles.length).fill(0);
    let cursor = target;

    for(let i=piles.length-1; i>=0; i--){
      const parent = parents[i][cursor];
      if(!parent) break;
      picks[i] = parent.count;
      cursor = parent.previous;
    }

    const tasks = buildTasksFromExactPicks(piles, picks);

    // 先走快速贪心；失败再走回溯搜索，确保满包模式不会误退。
    let packing = packTasks(tasks);
    if(!packing.success || target === capacity){
      const searched = packTasksWithSearch(tasks, target === capacity ? 200000 : 60000);
      if(searched.success) packing = searched;
    }

    if(!packing.success) continue;

    return {
      scaledUnits: target,
      units: target * SCALE,
      value: dp[target],
      byType: byTypeFromExactPicks(piles, picks),
      tasks,
      packing,
      splitCount: packing.splitCount,
      maxPileCount: packing.maxPileCount,
      totalPileTouches: packing.totalPileTouches
    };
  }

  return {
    scaledUnits:0,
    units:0,
    value:0,
    byType:{},
    tasks:[],
    packing:{success:true, segments:[], splitCount:0, maxPileCount:0, totalPileTouches:0},
    splitCount:0,
    maxPileCount:0,
    totalPileTouches:0
  };
}

function calculateResult(){
  const t0 = performance.now();
  const counts = getCounts();
  const piles = buildPiles(counts);
  let selection;

  if(mode === "strict"){
    selection = exactStrictSelection(piles);
  }else{
    const maxScaled = scaledTotalCap();
    const typeOptions = {};
    for(const type of TYPES) typeOptions[type.key] = buildTypeOptions(type, counts[type.key], maxScaled);
    const states = combineTypeOptions(typeOptions);
    selection = chooseSelection(states, piles);
  }

  const players = buildPlayers(selection.packing.segments);
  const availableUnits = piles.reduce((sum,p)=>sum+p.sequence.reduce((a,u)=>a+u,0),0);
  const elapsed = performance.now() - t0;

  return {counts, piles, playerCount, mode, selection, players, availableUnits, usedUnits:selection.units, value:selection.value, elapsed, unusedTags:unusedTags(selection.byType, counts), splitCount:selection.splitCount, maxPileCount:selection.maxPileCount, totalPileTouches:selection.totalPileTouches};
}

function buildPlayers(segments){
  const players = Array.from({length:playerCount},(_,i)=>({id:i+1,units:0,value:0,segments:[]}));
  for(const s of segments){
    const p = players[s.playerIndex];
    p.units += s.units;
    p.value += s.value;
    p.segments.push(s);
  }
  for(const p of players){
    p.segments.sort((a,b)=> typeMap[a.typeKey].priority-typeMap[b.typeKey].priority || a.pileNumber-b.pileNumber || a.start-b.start);
  }
  return players;
}

function unusedTags(byType, counts){
  const tags = [];
  for(const type of TYPES){
    const opt = byType[type.key];
    const selected = opt ? opt.prefixCounts : [];
    for(let i=0;i<counts[type.key];i++){
      const take = selected[i] || 0;
      if(take >= type.sequence.length) continue;
      if(type.sequence.length === 1){
        tags.push(`${type.name}第${i+1}幅`);
      }else if(take === 0){
        tags.push(`${type.name}第${i+1}堆：未拿，共${type.sequence.length}下`);
      }else{
        tags.push(`${type.name}第${i+1}堆：已拿${take}下，剩第${take+1}—${type.sequence.length}下`);
      }
    }
  }
  return tags;
}

function segLabel(s){
  const t = typeMap[s.typeKey];
  const word = t.sequence.length === 1 ? "次" : "下";
  const range = s.start === s.end ? `${s.start}` : `${s.start}—${s.end}`;
  return `${s.typeName}第${s.pileNumber}${t.noun}第${range}${word}`;
}

function renderPlayers(players){
  playersContainer.innerHTML = players.map(p=>{
    const pileCount = new Set(p.segments.map(s=>s.pileIndex)).size;
    const loot = p.segments.map(s=>{
      const t = typeMap[s.typeKey];
      const label = t.sequence.length === 1 ? `${s.count}幅` : `${s.count}下`;
      return `<div class="line"><div class="lineMain"><span>${s.typeName} ${label}</span><span>${pct(s.units)}</span></div><div class="detail">${segLabel(s)} · 约${money(s.value)}</div></div>`;
    }).join("");
    return `<article class="player"><div class="ptop"><div class="ptitle"><span class="num">${p.id}</span>${p.id}号玩家</div><strong>${pct(p.units)} · ${pileCount}堆</strong></div><div class="bar"><div style="width:${Math.min(100,p.units*100/PLAYER_CAPACITY)}%"></div></div><div class="loot">${loot||'<div class="empty">本局暂无可分配目标</div>'}</div></article>`;
  }).join("");
}

function renderResult(r){
  const full = r.players.filter(p=>p.units===PLAYER_CAPACITY).length;
  const can = full === r.playerCount;
  document.getElementById("availableMetric").textContent = pct(r.availableUnits);
  document.getElementById("usedMetric").textContent = pct(r.usedUnits);
  document.getElementById("fullMetric").textContent = `${full} / ${r.playerCount}`;
  document.getElementById("valueMetric").textContent = money(r.value);

  const banner = document.getElementById("statusBanner");
  const mark = banner.querySelector(".mark");
  const title = document.getElementById("statusTitle");
  const text = document.getElementById("statusText");

  if(can){
    banner.classList.remove("warn");
    mark.textContent = "✓";
    title.textContent = `可以达成${r.playerCount}人满载`;
  }else{
    banner.classList.add("warn");
    mark.textContent = "!";
    title.textContent = `当前方案可装满${full}/${r.playerCount}人`;
  }

  const modeText = r.mode === "strict" ? "严格满包 / 精确搜索" : "收益容差 / 快速搜索";
  text.textContent = `${modeText}模式；预计收益${money(r.value)}；拆分${r.splitCount}堆；每人最多接触${r.maxPileCount}堆；计算耗时${fmtNum(r.elapsed)}ms。`;

  renderPlayers(r.players);
  document.getElementById("unusedList").innerHTML = r.unusedTags.length ? r.unusedTags.map(t=>`<span class="tag">${t}</span>`).join("") : '<span class="tag">已全部纳入方案</span>';
}

function renderIdle(title="等待生成方案",text="填写物资数量后，点击“生成方案”开始计算。"){
  latestResult = null;
  document.getElementById("availableMetric").textContent = "—";
  document.getElementById("usedMetric").textContent = "—";
  document.getElementById("fullMetric").textContent = `0 / ${playerCount}`;
  document.getElementById("valueMetric").textContent = "—";
  const banner = document.getElementById("statusBanner");
  banner.classList.add("warn");
  banner.querySelector(".mark").textContent = "!";
  document.getElementById("statusTitle").textContent = title;
  document.getElementById("statusText").textContent = text;
  playersContainer.innerHTML = "";
  document.getElementById("unusedList").innerHTML = '<span class="tag">点击“生成方案”后显示</span>';
}

function markDirty(msg="参数已修改，点击“生成方案”重新计算。"){ renderIdle("参数已修改",msg); }

function calculateAndRender(){ latestResult = calculateResult(); renderResult(latestResult); }

function buildCopyText(r){
  const full = r.players.filter(p=>p.units===PLAYER_CAPACITY).length;
  const lines = [
    `佩里科岛${r.playerCount}人背包装填方案`,
    `模式：${r.mode==="strict"?"严格满包":"收益容差"}`,
    `满包人数：${full}/${r.playerCount}`,
    `总装载：${pct(r.usedUnits)}`,
    `预计收益：${money(r.value)}`,
    `拆分：${r.splitCount}堆；每人最多接触${r.maxPileCount}堆`,
    ""
  ];

  for(const p of r.players){
    const pileCount = new Set(p.segments.map(s=>s.pileIndex)).size;
    const parts = p.segments.map(s=>`${segLabel(s)}（${s.count}${typeMap[s.typeKey].sequence.length===1?"幅":"下"}）`);
    lines.push(`${p.id}号：${parts.length?parts.join(" + "):"无"}（${pct(p.units)}，涉及${pileCount}堆，约${money(p.value)}）`);
  }
  return lines.join("\n");
}

async function copyResult(){
  if(!latestResult){ showToast("请先点击“生成方案”"); return; }
  const txt = buildCopyText(latestResult);
  try{ await navigator.clipboard.writeText(txt); }
  catch(e){
    const ta=document.createElement("textarea");
    ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove();
  }
  showToast("方案已复制");
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(showToast.timer);
  showToast.timer=setTimeout(()=>t.classList.remove("show"),1500);
}

document.addEventListener("click", e=>{
  const pc = e.target.closest("[data-player-count]");
  if(pc){
    const n=Number(pc.dataset.playerCount);
    if(Number.isInteger(n) && n>=2 && n<=4){
      playerCount = n;
      document.querySelectorAll("[data-player-count]").forEach(b=>b.classList.toggle("active",Number(b.dataset.playerCount)===playerCount));
      markDirty(`参与人数已改为${playerCount}人，点击“生成方案”重新计算。`);
    }
  }

  const md = e.target.closest("[data-mode]");
  if(md){
    mode = md.dataset.mode;
    document.querySelectorAll("[data-mode]").forEach(b=>b.classList.toggle("active",b.dataset.mode===mode));
    markDirty(`优化模式已切换为${mode==="strict"?"严格满包":"收益容差"}，点击“生成方案”重新计算。`);
  }

  const st = e.target.closest("[data-step]");
  if(st){
    const input = document.getElementById(st.dataset.key);
    input.value = Math.max(0, Math.min(MAX_COUNT, Math.floor(Number(input.value||0)+Number(st.dataset.step))));
    markDirty();
  }

});

inputContainer.addEventListener("input", e=>{
  if(!e.target.matches("input[type='number']")) return;
  const v=Number(e.target.value);
  if(!Number.isFinite(v)||v<0)e.target.value=0;
  else if(v>MAX_COUNT)e.target.value=MAX_COUNT;
  markDirty();
});

document.getElementById("calculateBtn").addEventListener("click", calculateAndRender);
document.getElementById("copyBtn").addEventListener("click", copyResult);
document.getElementById("clearBtn").addEventListener("click", ()=>setCounts({}));

createInputs();
renderIdle();
</script>
</body>
</html>
